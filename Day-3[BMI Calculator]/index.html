<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI calculator</title>
  </head>

  <!--Style-->

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap");
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f7f1de;
    }
    .container {
      width: 400px;
      height: 500px;
      border-radius: 20px;
      background-color: #b0ba99;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }
    .tittle h1 {
      font-size: 40px;
      position: relative;
      bottom: -20px;
      font-family: "Bebas Neue", sans-serif;
    }
    .inputs input {
      font-size: 20px;
      padding-right: 40px;
      padding-left: 20px;
      padding-bottom: 15px;
      padding-top: 15px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }
    button {
      font-family: "Bebas Neue", sans-serif;
      font-size: 25px;
      padding: 10px 110px;
      border-radius: 10px;
      border: none;
      outline: none;
      position: relative;
      bottom: 30px;
      background-color: #4e220f;
      color: #ffffff;
    }
    button:hover {
    }
    h3 {
      position: relative;
      bottom: 20px;
      font-size: 25px;
      font-family: "poppins", sans-serif;
      font-style: italic;
    }
  </style>

  <!--HTML-->

  <body>
    <div class="container">
      <div class="tittle">
        <h1>BMI Calculator</h1>
      </div>
      <div class="inputs">
        <input
          type="number"
          id="weight"
          placeholder="Enter weight "
          required
        /><br />
        <input
          type="number"
          id="height"
          placeholder="Enter height(m)"
          required
        />
      </div>
      <div class="button">
        <button onclick="check()">Check!</button>
      </div>
      <div class="result">
        <h3 id="result"></h3>
      </div>
    </div>

    <!-- Script-->

    <script>
      function check() {
        const weight = Number(document.getElementById("weight").value);
        const height = Number(document.getElementById("height").value);
        let BMI = weight / (height * height);
        if (BMI < 18.5) {
          document.getElementById("result").textContent = "Under-Weight";
        } else if (BMI >= 18.5 || 24.9 < BMI) {
          document.getElementById("result").textContent = "Normal-Weight";
        } else if (BMI >= 25 || 29.9 < BMI) {
          document.getElementById("result").textContent = "Over-Weight";
        } else if (BMI >= 30) {
          document.getElementById("result").textContent = "Obese";
        }
      }
    </script>
  </body>
</html>
